<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>PEA Tracker</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#30363d;--border-dim:#21262d;--text:#e6edf3;--muted:#b0bac5;--dim:#8b949e;--green:#3fb950;--green-bg:rgba(63,185,80,.09);--green-bdr:rgba(63,185,80,.28);--yellow:#d29922;--yellow-bg:rgba(210,153,34,.09);--yellow-bdr:rgba(210,153,34,.28);--red:#f85149;--red-bg:rgba(248,81,73,.09);--red-bdr:rgba(248,81,73,.28);--blue:#58a6ff;--blue-bg:rgba(88,166,255,.09);--blue-bdr:rgba(88,166,255,.28);--purple:#bc8cff;--purple-bg:rgba(188,140,255,.09);--purple-bdr:rgba(188,140,255,.28);--mono:'SF Mono','Fira Code','Cascadia Code',ui-monospace,monospace;--nav-h:60px;--band-h:52px;--r:7px;--r-sm:4px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:auto;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
#tension-bar{position:fixed;top:0;left:0;right:0;height:calc(var(--band-h) / 2 + 3px);z-index:300;background:var(--green);transition:background .8s ease}
#tension-bar.neutral{background:var(--yellow)}
#tension-bar.danger{background:var(--red);animation:tbar-pulse 2.2s ease-in-out infinite}
@keyframes tbar-pulse{0%,100%{opacity:1}50%{opacity:.35}}
#top-band{position:sticky;top:calc(var(--band-h) / 2);height:var(--band-h);background:var(--bg2);border-bottom:1px solid var(--border-dim);z-index:200;display:flex;align-items:center;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;white-space:nowrap;padding:0 2px;flex-wrap:nowrap;touch-action:pan-x}
#top-band::-webkit-scrollbar{display:none}
.bi{display:inline-flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:0 13px;border-right:1px solid var(--border-dim);height:100%;gap:2px;flex-shrink:0;min-width:90px}
.bi:last-child{border-right:none}
.bi-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-family:var(--mono)}
.bi-val{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text)}
.up{color:var(--green)}.down{color:var(--red)}.neut{color:var(--yellow)}
.band-sig{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;font-family:var(--mono);padding:2px 9px;border-radius:3px;letter-spacing:.03em}
.band-sig.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}
.band-sig.y{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bdr)}
.band-sig.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.antici-row{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--green)}.dot.y{background:var(--yellow)}.dot.r{background:var(--red)}
.antici-lbl{color:var(--dim);font-size:9px}
#main{position:relative;padding-top:8px;padding-bottom:80px;overflow-x:hidden;min-height:calc(100vh - var(--band-h) - var(--nav-h))}
.tab-panel{display:none;padding:12px 12px 120px}
.tab-panel.active{display:block;animation:fadein .18s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--dim);cursor:pointer;padding:8px 0;position:relative;transition:color .12s ease;-webkit-tap-highlight-color:transparent;font-family:inherit}
.nav-btn.active{color:var(--blue)}
.nav-icon{font-size:19px;line-height:1}.nav-label{font-size:10px;letter-spacing:.02em}
.nav-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:var(--mono);border:1px solid var(--bg2)}
.ptf-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.ptf-card{background:var(--bg2);border:1px solid var(--border-dim);border-radius:var(--r);padding:10px 12px;display:flex;flex-direction:column;gap:3px}
.ptf-card.full{grid-column:1/-1}
.ptf-label{font-size:10px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}
.ptf-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--text)}
.ptf-val.pos{color:var(--green)}.ptf-val.neg{color:var(--red)}
.ptf-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.alloc-wrap{background:var(--bg2);border:1px solid var(--border-dim);border-radius:var(--r);padding:10px 12px;margin-bottom:16px}
.alloc-title{font-size:10px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.alloc-track{height:8px;border-radius:4px;overflow:hidden;display:flex;margin-bottom:8px}
.alloc-seg{height:100%;transition:width .4s ease}
.alloc-seg.s{background:var(--blue)}.alloc-seg.c{background:var(--yellow)}.alloc-seg.g{background:var(--purple)}
.alloc-legend{display:flex;gap:12px;flex-wrap:wrap}
.alloc-li{display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono);color:var(--muted)}
.alloc-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pocket-block{margin-bottom:18px}
.pocket-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-radius:var(--r-sm) var(--r-sm) 0 0;background:var(--bg3);border:1px solid var(--border-dim);border-bottom:none}
.pocket-name{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-family:var(--mono)}
.pocket-name.s{color:var(--blue)}.pocket-name.c{color:var(--yellow)}.pocket-name.g{color:var(--purple)}
.pocket-right{display:flex;align-items:center;gap:8px}
.pocket-pct{font-size:11px;font-family:var(--mono);color:var(--muted)}
.pkt-bar-track{width:54px;height:4px;background:var(--border-dim);border-radius:2px;overflow:hidden}
.pkt-bar-fill{height:100%;border-radius:2px}
.pkt-bar-fill.s{background:var(--blue)}.pkt-bar-fill.c{background:var(--yellow)}.pkt-bar-fill.g{background:var(--purple)}
.vc{background:var(--bg2);border:1px solid var(--border-dim);border-top:none;padding:11px 12px 10px;cursor:pointer;position:relative;transition:background .1s}
.vc:last-child{border-radius:0 0 var(--r-sm) var(--r-sm)}
.vc:active{filter:brightness(1.1)}
.vc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;opacity:0;transition:opacity .2s;border-radius:0}
.vc.open::before{opacity:1}
.vc.sb::before{background:var(--green)}.vc.ss::before{background:var(--red)}.vc.sn::before{background:var(--yellow)}
.vc.pocket-s{background:rgba(88,166,255,.10);border-color:rgba(88,166,255,.30)}
.vc.pocket-c{background:rgba(210,153,34,.10);border-color:rgba(210,153,34,.30)}
.vc.pocket-g{background:rgba(188,140,255,.10);border-color:rgba(188,140,255,.30)}
.vr1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
.vl{display:flex;flex-direction:column;gap:2px}
.vname{font-size:14px;font-weight:600;color:var(--text)}
.vtick{font-size:10px;color:var(--dim);font-family:var(--mono)}
.vright{text-align:right;display:flex;flex-direction:column;gap:1px;align-items:flex-end}
.vcours{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text)}
.vvar{font-size:11px;font-family:var(--mono);font-weight:600}
.vr2{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.pv{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-family:var(--mono);font-weight:600;padding:2px 7px;border-radius:3px}
.pv.pos{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}
.pv.neg{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.spills{display:flex;gap:5px;flex-wrap:wrap}
.sp{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 7px;border-radius:3px;white-space:nowrap;letter-spacing:.02em}
.sp .sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sp.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}
.sp.y{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bdr)}
.sp.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.vr3{display:flex;align-items:center;gap:8px}
.slbar-wrap{position:relative;width:100%;padding:14px 0 14px 0}
.slbar-track{position:relative;height:6px;background:linear-gradient(to right, var(--red), var(--yellow) 30%, var(--green) 70%, var(--blue));border-radius:3px}
.slbar-marker{position:absolute;width:1px;height:12px;background:var(--muted);top:-3px}
.slbar-marker-label{position:absolute;font-size:8px;font-family:var(--mono);color:var(--muted);white-space:nowrap;transform:translateX(-50%)}
.slbar-marker-label.top{top:-14px}
.slbar-marker-label.bot{top:12px}
.sl-cursor{position:absolute;width:3px;height:14px;background:var(--text);top:-4px;transform:translateX(-50%);border-radius:1px;box-shadow:0 0 4px rgba(255,255,255,0.5)}.no-stop{font-size:10px;color:var(--dim);font-family:var(--mono)}
.vdetail{display:none;padding:10px 0 2px;border-top:1px solid var(--border-dim);margin-top:10px}
.vdetail.open{display:block}
.dtitle{font-size:9px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;margin-top:12px}
.dtitle:first-child{margin-top:0}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:4px}
.sitem{display:flex;flex-direction:column;gap:3px}
.slbl{font-size:9px;color:var(--dim);font-family:var(--mono);letter-spacing:.04em}
.srow{display:flex;align-items:center;gap:6px}
.strack{flex:1;height:5px;background:var(--border-dim);border-radius:2px;overflow:hidden}
.sfill{height:100%;border-radius:2px}
.sfill.g{background:var(--green)}.sfill.y{background:var(--yellow)}.sfill.r{background:var(--red)}
.sval{font-size:10px;font-family:var(--mono);font-weight:600;width:30px;text-align:right}
.sval.g{color:var(--green)}.sval.y{color:var(--yellow)}.sval.r{color:var(--red)}
.cblock{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border:1px solid var(--border-dim);border-radius:var(--r-sm);margin:7px 0 3px}
.cleft{display:flex;flex-direction:column;gap:2px}
.clbl{font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
.cval{font-size:22px;font-weight:700;font-family:var(--mono)}
.cval.g{color:var(--green)}.cval.y{color:var(--yellow)}.cval.r{color:var(--red)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fi{display:flex;flex-direction:column;gap:2px;padding:7px 8px;background:var(--bg3);border:1px solid var(--border-dim);border-radius:var(--r-sm)}
.flbl{font-size:9px;color:var(--dim);font-family:var(--mono)}
.fval{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text)}
.pos-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.pi{padding:7px 8px;background:var(--bg3);border:1px solid var(--border-dim);border-radius:var(--r-sm);display:flex;flex-direction:column;gap:2px}
.pi-lbl{font-size:9px;color:var(--dim);font-family:var(--mono)}
.pi-val{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text)}
.pi-val.stop{color:var(--red)}.pi-val.obj{color:var(--green)}
.alert-strip{padding:8px 10px;border-radius:var(--r-sm);font-size:11px;font-family:var(--mono);margin:8px 0;display:flex;align-items:center;gap:6px}
.alert-strip.warn{background:var(--yellow-bg);border:1px solid var(--yellow-bdr);color:var(--yellow)}
.alert-strip.danger{background:var(--red-bg);border:1px solid var(--red-bdr);color:var(--red)}
.empty-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--dim)}
.e-icon{font-size:42px}.e-title{font-size:16px;font-weight:600;color:var(--muted)}
.e-sub{font-size:13px;text-align:center;max-width:240px;line-height:1.55}
/* WL */
.wl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.wl-count{font-size:13px;font-weight:600;color:var(--text)}.wl-count span{color:var(--blue);font-family:var(--mono)}
.btn-add{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--blue-bg);border:1px solid var(--blue-bdr);border-radius:var(--r-sm);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.tl-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.tl-pill{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:var(--mono);font-weight:600;padding:2px 6px;border-radius:3px}
.tl-pill.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}
.tl-pill.y{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bdr)}
.tl-pill.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.tl-pill .td{width:5px;height:5px;border-radius:50%}
.tl-result{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);font-weight:700;padding:4px 10px;border-radius:var(--r-sm);margin-top:4px}
.tl-result.enter{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}
.tl-result.watch,.tl-result.partial{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bdr)}
.tl-result.hunter{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bdr)}
.tl-result.blocked{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.corr-badge{display:inline-flex;align-items:center;font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 7px;border-radius:3px}
.corr-badge.low{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}
.corr-badge.mid{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bdr)}
.corr-badge.high{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.wl-vr2{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.wl-vr3{display:flex;flex-direction:column;gap:4px}
.wl-actions{display:flex;gap:8px;margin-top:16px}.wl-actions .btn-add{flex:1;justify-content:center}
.wl-list .vc{border:1px solid var(--border-dim);border-radius:var(--r-sm);margin-bottom:7px}
/* SIG */
.sig-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sig-count{font-size:13px;font-weight:600;color:var(--text)}.sig-count span{color:var(--red);font-family:var(--mono)}
.sig-filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}.sig-filters::-webkit-scrollbar{display:none}
.sig-filter{padding:5px 12px;border-radius:20px;font-size:11px;font-family:var(--mono);font-weight:600;border:1px solid var(--border-dim);background:none;color:var(--dim);cursor:pointer;white-space:nowrap}
.sig-filter.active{background:var(--blue-bg);border-color:var(--blue-bdr);color:var(--blue)}
.sig-section-title{font-size:10px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin:18px 0 8px;display:flex;align-items:center;gap:6px}
.sig-section-title .sig-dot{width:6px;height:6px;border-radius:50%}
.sig-card{background:var(--bg2);border:1px solid var(--border-dim);border-radius:var(--r);padding:12px;margin-bottom:8px;position:relative}
.sig-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r)}
.sig-card.sig-y::before{background:var(--yellow)}.sig-card.sig-g::before{background:var(--green)}.sig-card.sig-r::before{background:var(--red)}.sig-card.sig-b::before{background:var(--blue)}
.sig-card.sig-done{opacity:.55}.sig-card.sig-done::before{background:var(--dim)}
.sig-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.sig-left{display:flex;flex-direction:column;gap:2px}
.sig-name{font-size:14px;font-weight:600;color:var(--text)}
.sig-tick{font-size:10px;color:var(--dim);font-family:var(--mono)}
.sig-date{font-size:10px;color:var(--dim);font-family:var(--mono)}
.sig-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);font-weight:600;padding:3px 8px;border-radius:3px;margin-bottom:6px}
.sig-badge.y{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bdr)}
.sig-badge.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}
.sig-badge.b{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr)}
.sig-badge.done{background:var(--bg3);color:var(--dim);border:1px solid var(--border-dim)}
.sig-detail{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:8px;line-height:1.5}.sig-detail strong{color:var(--text)}
.sig-action-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sig-action-lbl{font-size:11px;font-family:var(--mono);color:var(--muted)}
.btn-treat{padding:6px 14px;border-radius:var(--r-sm);font-size:11px;font-family:var(--mono);font-weight:600;cursor:pointer;border:none}
.btn-treat.primary{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr)}
.btn-treat.dividend{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bdr)}
.sig-history-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;margin-top:6px;font-size:11px;font-family:var(--mono);color:var(--dim);cursor:pointer;border:1px solid var(--border-dim);border-radius:var(--r-sm);background:none;width:100%}
.sig-history{display:none}.sig-history.open{display:block}
.sig-treated-lbl{font-size:10px;color:var(--dim);font-family:var(--mono);margin-left:auto}
/* TX */
.detail-actions{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.detail-actions .btn-graph{flex:1 1 100%}
.detail-actions-row2{display:flex;gap:6px;width:100%}
.btn-tx{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 4px;border-radius:var(--r-sm);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-tx.buy{border:1px solid var(--green-bdr);background:var(--green-bg);color:var(--green)}
.btn-tx.sell{border:1px solid var(--red-bdr);background:var(--red-bg);color:var(--red)}
.btn-tx.div{border:1px solid var(--purple-bdr);background:var(--purple-bg);color:var(--purple)}
.btn-buy-ptf{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 6px;border:1px solid var(--green-bdr);background:var(--green-bg);color:var(--green);border-radius:var(--r-sm);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.tx-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.tx-overlay.open{display:flex}
.tx-sheet{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:420px;padding:20px 16px calc(20px + env(safe-area-inset-bottom,0));animation:sheetUp .25s ease}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.tx-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.tx-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.tx-subtitle{font-size:11px;color:var(--dim);font-family:var(--mono);margin-bottom:16px}
.tx-row{display:flex;gap:8px;margin-bottom:10px}
.tx-field{flex:1;display:flex;flex-direction:column;gap:4px}
.tx-label{font-size:10px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.tx-input{background:var(--bg3);border:1px solid var(--border-dim);border-radius:var(--r-sm);padding:10px 12px;font-size:14px;font-family:var(--mono);color:var(--text);outline:none;width:100%;box-sizing:border-box}
.tx-input:focus{border-color:var(--blue)}.tx-input::placeholder{color:var(--dim)}
select.tx-input{-webkit-appearance:none;appearance:none}
.tx-submit{width:100%;padding:12px;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px}
.tx-submit.buy{background:var(--green);color:#0d1117}.tx-submit.sell{background:var(--red);color:#fff}
.tx-submit.dividend{background:var(--purple);color:#fff}
.tx-cancel{width:100%;padding:10px;border:1px solid var(--border-dim);border-radius:var(--r-sm);background:none;color:var(--dim);font-size:12px;font-family:inherit;cursor:pointer;margin-top:6px}
.tx-div-hint{font-size:10px;color:var(--purple);font-family:var(--mono);margin-top:8px;padding:6px 8px;background:var(--purple-bg);border:1px solid var(--purple-bdr);border-radius:var(--r-sm);display:none}
/* CAL */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:15px;font-weight:700;color:var(--text)}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border-dim);background:none;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cal-dow{text-align:center;font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;padding:6px 0}
.cal-cell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px 8px;border-radius:var(--r-sm);cursor:default;min-height:42px;border:1px solid transparent}
.cal-cell.has-ev{cursor:pointer}.cal-cell.has-ev:active{background:var(--bg3)}
.cal-cell.past .cal-num{opacity:.35}
.cal-cell.today{border-color:var(--green);background:rgba(63,185,80,.06)}
.cal-cell.today .cal-num{color:var(--green);font-weight:700}
.cal-cell.sel{border-color:var(--blue);background:rgba(88,166,255,.06)}
.cal-cell.empty{min-height:0;padding:0}
.cal-num{font-size:13px;font-family:var(--mono);color:var(--text);font-weight:500;line-height:1}
.cal-dots{display:flex;gap:2px;justify-content:center}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-dot.res{background:var(--blue)}.cal-dot.divi{background:var(--purple)}.cal-dot.bce{background:var(--yellow)}.cal-dot.pmi{background:var(--green)}
.cal-detail{display:none;margin-top:4px}.cal-detail.open{display:block}
.cal-detail-header{font-size:10px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.cal-ev{display:flex;align-items:flex-start;gap:10px;background:var(--bg2);border:1px solid var(--border-dim);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:6px}
.cal-ev-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.cal-ev-body{flex:1;display:flex;flex-direction:column;gap:2px}
.cal-ev-type{font-size:9px;font-family:var(--mono);font-weight:600;color:var(--dim)}
.cal-ev-name{font-size:13px;font-weight:600;color:var(--text)}
.cal-ev-info{font-size:11px;color:var(--muted);font-family:var(--mono)}
.cal-legend{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;font-family:var(--mono);color:var(--dim)}
/* NEWS */
.news-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.news-count{font-size:13px;font-weight:600;color:var(--text)}.news-count span{color:var(--blue);font-family:var(--mono)}
.news-filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}.news-filters::-webkit-scrollbar{display:none}
.news-card{background:var(--bg2);border:1px solid var(--border-dim);border-radius:var(--r);padding:12px;margin-bottom:8px;position:relative;cursor:pointer;transition:border-color .15s}
.news-card:active{border-color:var(--blue)}
.news-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r)}
.news-card.n-ent::before{background:var(--blue)}.news-card.n-sect::before{background:var(--purple)}.news-card.n-macro::before{background:var(--yellow)}.news-card.n-geo::before{background:var(--red)}
.news-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.news-time{font-size:9px;font-family:var(--mono);color:var(--dim)}
.news-src{font-size:9px;font-family:var(--mono);color:var(--dim);padding:1px 5px;background:var(--bg3);border-radius:2px}
.news-cat{font-size:9px;font-family:var(--mono);font-weight:600;padding:2px 6px;border-radius:3px}
.news-cat.ent{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr)}
.news-cat.sect{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bdr)}
.news-cat.macro{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bdr)}
.news-cat.geo{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.news-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
.news-summary{font-size:11px;color:var(--muted);font-family:var(--mono);line-height:1.5;margin-bottom:6px}
.news-tags{display:flex;gap:4px;flex-wrap:wrap}
.news-tag{font-size:9px;font-family:var(--mono);font-weight:600;padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--dim);border:1px solid var(--border-dim)}
.news-link{display:flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);color:var(--blue);margin-top:6px}
/* CHART EMBED */
.chart-embed-controls{display:flex;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap}
.chart-ctrl-group{display:flex;gap:2px;align-items:center}
.chart-ctrl{padding:4px 8px;border-radius:3px;font-size:9px;font-family:var(--mono);font-weight:600;border:1px solid var(--border-dim);background:none;color:var(--dim);cursor:pointer}
.chart-ctrl.active{background:var(--blue-bg);border-color:var(--blue-bdr);color:var(--blue)}
.chart-ctrl-sep{width:1px;height:16px;background:var(--border-dim);margin:0 4px}
.chart-embed{width:100%;height:220px;border-radius:var(--r-sm);overflow:hidden;margin-bottom:10px;background:var(--bg3)}
.wl-sr{padding:8px 10px;border:1px solid var(--border-dim);border-radius:var(--r-sm);margin-bottom:4px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s}
.wl-sr:active{border-color:var(--blue)}
.wl-sr-left{display:flex;flex-direction:column;gap:2px}
.wl-sr-name{font-size:13px;font-weight:600;color:var(--text)}
.wl-sr-tick{font-size:10px;font-family:var(--mono);color:var(--dim)}
.wl-sr-right{font-size:9px;font-family:var(--mono);color:var(--dim);text-align:right}
.wl-poche-badge{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-family:var(--mono);font-weight:600;padding:2px 6px;border-radius:3px;margin-left:6px}
.wl-poche-badge.s{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr)}
.wl-poche-badge.c{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bdr)}
.wl-poche-badge.g{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bdr)}
.btn-delete{display:flex;align-items:center;justify-content:center;padding:6px 10px;border:1px solid var(--red-bdr);background:var(--red-bg);color:var(--red);border-radius:var(--r-sm);font-size:9px;font-family:var(--mono);font-weight:600;cursor:pointer;margin-top:8px}
.tl-result.wait{background:var(--bg3);color:var(--muted);border:1px solid var(--border-dim)}
.tl-result.neutral{background:var(--bg3);color:var(--dim);border:1px solid var(--border-dim)}
.sig-badge.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.sig-card .sig-tick{color:var(--muted)}
.sig-card .sig-action-lbl{color:var(--muted)}

.wl-filter.active {
  background: #2a2a2a;
  color: white;
  border-color: #555;
}
/* SECTION MACRO — Modal détail */
.macro-section{margin-top:14px;background:var(--bg2);border:1px solid var(--border-dim);border-radius:var(--r);overflow:hidden}
.macro-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;user-select:none;background:var(--bg3);border-bottom:1px solid var(--border-dim);transition:background .12s}
.macro-hdr:active{background:var(--border-dim)}
.macro-hdr-title{font-size:11px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--text);font-weight:600}
.macro-hdr-chevron{font-size:10px;color:var(--dim);transition:transform .2s}
.macro-section.open .macro-hdr-chevron{transform:rotate(180deg)}
.macro-body{display:none;padding:8px 0}
.macro-section.open .macro-body{display:block}
.macro-row{display:grid;grid-template-columns:30px 1fr 70px 65px;align-items:center;padding:7px 12px;font-size:11px;font-family:var(--mono);border-bottom:1px solid var(--border-dim)}
.macro-row:last-child{border-bottom:none}
.macro-imp{display:inline-block;font-size:9px;color:var(--dim);text-align:left;letter-spacing:1px}
.macro-label{color:var(--muted);padding-right:8px}
.macro-val{font-weight:700;text-align:center}
.macro-val.g{color:var(--green)}
.macro-val.y{color:var(--yellow)}
.macro-val.r{color:var(--red)}
.macro-seuils{color:var(--dim);font-size:10px;text-align:right}
.macro-imp{display:inline-block;width:30px;font-size:9px;color:var(--dim);text-align:left;letter-spacing:1px;flex-shrink:0;}
.macro-row{display:grid;grid-template-columns:30px 1fr 70px 65px;align-items:center;padding:7px 12px;font-size:11px;font-family:var(--mono);border-bottom:1px solid var(--border-dim);}
.macro-subheader{padding:6px 12px 4px;font-size:9px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;background:var(--bg2);border-bottom:1px solid var(--border-dim)}
.macro-subheader-note{font-size:8px;color:var(--dim);opacity:0.7;text-transform:none;letter-spacing:0.5px;margin-left:6px}

.skeleton-container {

.skeleton {
  background: linear-gradient(90deg, var(--bg2) 0%, var(--bg3) 50%, var(--bg2) 100%);

function chargerDetailStableEtInjecter(ticker, cardId, ouvertures) {
  ouvertures = ouvertures || {};
  
  function injecter(data) {
    var mc = document.getElementById('mc-' + cardId);
    if (mc && !mc.innerHTML && data.macro) {
      mc.innerHTML = genererSectionMacro(data.macro);
      if (ouvertures.macro) mc.querySelector('.macro-section').classList.add('open');
    }
    var sel = document.getElementById('sel-' + cardId);
    if (sel && !sel.innerHTML && data.selection) {
      sel.innerHTML = genererSectionSelection(data.selection);
      if (ouvertures.sel) sel.querySelector('.macro-section').classList.add('open');
    }
    var tim = document.getElementById('tim-' + cardId);
    if (tim && !tim.innerHTML && data.timing) {

      if (ouvertures.tim) tim.querySelector('.macro-section').classList.add('open');
    }
    var vet = document.getElementById('vet-' + cardId);
    if (vet && !vet.innerHTML && data.vetos) {
      vet.innerHTML = genererSectionVetos(data.vetos);
      if (ouvertures.vet) vet.querySelector('.macro-section').classList.add('open');
    }
  }
  
  if (detailStableCache[ticker]) { injecter(detailStableCache[ticker]); return; }
  
  fetch(urlAPI('?action=detail_stable&ticker=' + encodeURIComponent(ticker)))
    .then(function(r) { return r.json(); })

      detailStableCache[ticker] = data;

    .catch(function(err) { console.warn('Erreur detail stable', err); });

document.addEventListener('DOMContentLoaded', function() {
  // Injecter les skeletons avant le premier chargement
  var elPtf = document.getElementById('ptf-skeleton');
  var elWl  = document.getElementById('wl-skeleton');
  var elSig = document.getElementById('sig-skeleton');
  var elCal = document.getElementById('cal-skeleton');
  if (elPtf) elPtf.innerHTML = skeletonPortefeuille();
  if (elWl)  elWl.innerHTML  = skeletonWatchlist();
  if (elSig) elSig.innerHTML = skeletonSignaux();
  if (elCal) elCal.innerHTML = skeletonCalendrier();
  chargerDonnees();
  planifierRefreshQuotidien();
  // Vider le cache graphiques à 18h40 heure française (UTC+2)
  setInterval(function() {
    var now = new Date();
    var hFr = now.getUTCHours() + 2;
    if (hFr >= 24) hFr -= 24;
    var m = now.getUTCMinutes();
    if (hFr === 18 && m >= 40 && m <= 41) {
      macroCache = {};
      chartCache = {};
      cmCache = {};
      csCache = {};
      vvCache = {};
      ssCache = {};
      detailCycliqueCache = {};
            console.log('📊 Cache graphiques vidé (18h40)');
    }
  }, 30 * 1000);
  ['tx-qty','tx-price'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('input', function() {
      var q = parseFloat(document.getElementById('tx-qty').value) || 0;
      var p = parseFloat(document.getElementById('tx-price').value) || 0;
      var t = document.getElementById('tx-total');
      t.textContent = (q && p) ? (q * p).toLocaleString('fr-FR', {minimumFractionDigits:2}) + ' €' : '—';
    });
  });
});

function switchTab(id, btn) {
  currentTab = id;
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  var wlHeader = document.getElementById('wl-sticky-header');
  if (wlHeader) wlHeader.style.display = id === 'wl' ? '' : 'none';
  // Refresh silencieux au changement d'onglet (avec throttle 30s)
  var now = Date.now();
  if (now - dernierRefresh > REFRESH_THROTTLE_MS) {
    dernierRefresh = now;
    chargerDonnees();
  }
}

// ── OUVERTURE / FERMETURE CARTES ──────
function toggleCard(id) {
  var card = document.getElementById(id);
  if (!card) return;
  var detail = card.querySelector('.vdetail');
  if (!detail) return;
  var isOpen = card.classList.contains('open');
  var parent = card.closest('.pocket-block') || card.closest('.wl-list');
  if (parent) {
    parent.querySelectorAll('.vc.open').forEach(function(c) {
      if (c !== card) {
        c.classList.remove('open');
        var d = c.querySelector('.vdetail');
        if (d) d.classList.remove('open');
      }
    });
  }
  if (isOpen) {
    card.classList.remove('open');
    detail.classList.remove('open');
  } else {
    card.classList.add('open');
    detail.classList.add('open');
    var chartEl = detail.querySelector('.chart-embed');
    if (chartEl) {
      var cid = chartEl.id.replace('ce-', '');
      var tickEl = card.querySelector('.vtick');
      if (tickEl) {
        var tk = tickEl.textContent.split('·')[0].trim();
        chargerGraphiqueEmbed(tk, cid, '3mo', 'line');
      }
    }

    var mcContainerCheck = detail.querySelector('.mc-container, .macro-container');
    if (mcContainerCheck) {
      var tickEl = card.querySelector('.vtick');
      if (tickEl) {
        var tk = tickEl.textContent.split('·')[0].trim();
        var idCarte = card.id.replace('c-', '');
    
        // Détecter la poche depuis la carte
        var pocheClass = card.className;
        if (pocheClass.indexOf('pocket-s') >= 0) {
          chargerDetailStableEtInjecter(tk, idCarte);
        } else if (pocheClass.indexOf('pocket-c') >= 0) {
          chargerDetailCycliqueEtInjecter(tk, idCarte);
        } else if (pocheClass.indexOf('pocket-g') >= 0) {
          chargerDetailGrowthEtInjecter(tk, idCarte);
        }
      }
    }
    
    setTimeout(function() { card.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 60);
  }
  var mcContainer = document.getElementById('mc-' + id);
  if (mcContainer && !mcContainer.innerHTML) {
    mcContainer.innerHTML = genererSectionMacro();
  }
}

function skeletonPortefeuille() {
  var html = '<div class="skeleton-container">';
  // Header portefeuille (total, variation)
  html += '<div class="sk-card">'
    + '<div class="sk-card-row"><div class="skeleton sk-line med" style="height:20px;"></div><div class="skeleton sk-line short" style="height:20px;"></div></div>'
    + '<div class="skeleton sk-line short"></div>'
    + '</div>';
  // 4 cartes lignes de portefeuille

function chargerDonnees() {
  var cache = localStorage.getItem('peaCache');
  if (cache && !peaData) {
    peaData = JSON.parse(cache);
    rafraichirUI(peaData);
  }
  fetch(urlAPI(''))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      peaData = data;
      localStorage.setItem('peaCache', JSON.stringify(data));
      localStorage.setItem('peaCacheDate', new Date().toISOString());
      rafraichirUI(data);
      prechargerGraphiques();
      if (calTickers.length === 0) {
        chargerTickersFiltre();
      }
    })
    .catch(function(err) { console.warn('API indisponible', err); });
}

/**
 * Planifie un refresh automatique tous les jours à 18h30 heure de Paris.
 * S'auto-replanifie après chaque exécution.
 */
function planifierRefreshQuotidien() {
  var now = new Date();
  var cible = new Date();
  cible.setHours(18, 30, 0, 0);

  // Si 18h30 est déjà passé aujourd'hui, on programme pour demain
  if (now >= cible) {
    cible.setDate(cible.getDate() + 1);
  }

  var delai = cible.getTime() - now.getTime();
  console.log('Prochain refresh auto dans ' + Math.round(delai / 1000 / 60) + ' min');

  setTimeout(function() {
    console.log('🔄 Refresh automatique 18h30');
    chartCache = {};
    chargerDonnees();
    // Reprogrammer pour le lendemain
    planifierRefreshQuotidien();
  }, delai);
}

function rafraichirUI(data) {
  // Sauvegarder uniquement la position de scroll
  var scrollPos = window.scrollY;

  if (data.contexte) majBarre(data.contexte);
  if (data.portefeuille) majPortefeuille(data.portefeuille, data.indicateurs, data.fondamentaux);
  if (data.watchlist) majWatchlist(data.watchlist, data.indicateurs, data.fondamentaux);
  if (data.signaux) majSignaux(data.signaux);
  if (data.referentiels) peuplerReferentiels();
  if (data.calendrier) {
    majCalendrierTest(data.calendrier);
    majBadgeCalendrier(data.calendrier);
  }

  // Modal "Ajouter une valeur"
  if (wlModalOuvert) {
    var ov = document.getElementById('wl-add-overlay');
    if (ov && !ov.classList.contains('open')) ov.classList.add('open');
  }

  // Modal Transaction
  if (txModalOuvert) {
    var tov = document.getElementById('tx-overlay');
    if (tov && !tov.classList.contains('open')) tov.classList.add('open');
  }

  window.scrollTo(0, scrollPos);
}

function prechargerGraphiques() {
  if (!peaData) return;
  var tickers = [];
  if (peaData.portefeuille && peaData.portefeuille.positions) {
    peaData.portefeuille.positions.forEach(function(p) {
      if (p.investi > 0 && tickers.indexOf(p.ticker) < 0) tickers.push(p.ticker);
    });
  }
  if (peaData.watchlist) {
    var wlItems = peaData.watchlist.items || peaData.watchlist;
    if (Array.isArray(wlItems)) {
      wlItems.forEach(function(w) {
        if (tickers.indexOf(w.ticker) < 0) tickers.push(w.ticker);
      });
    }
  }
  tickers.forEach(function(tk) {
    var ck = tk + '_3mo';
    if (chartCache[ck]) return;
    fetch(urlAPI('?action=historique&ticker=' + encodeURIComponent(tk) + '&range=3mo'))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.data && data.data.length > 0) chartCache[ck] = data.data;
      })
      .catch(function() {});
  });
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════

function fmt(v, dec) {
  if (v === null || v === undefined || v === '') return '—';
  var n = parseFloat(v);
  if (isNaN(n)) return v;
  return n.toLocaleString('fr-FR', {minimumFractionDigits: dec||0, maximumFractionDigits: dec||0});
}
function fmtPct(v) {
  if (v === null || v === undefined || v === '') return '—';
  var n = parseFloat(v);
  if (isNaN(n)) return v;
  n = n * 100;
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}
function fmtEuro(v) {
  if (v === null || v === undefined) return '—';
  return fmt(v, 2) + ' €';
}
function classeVar(v) {
  var n = parseFloat(v);
  if (isNaN(n)) return '';
  return n >= 0 ? 'up' : 'down';
}

function signalClasse(signal) {
  if (!signal) return 'y';
  var s = signal.toString();
  if (s.indexOf('🔴') >= 0) return 'r';
  if (s.indexOf('🟢') >= 0) return 'g';
  if (s.indexOf('🟡') >= 0) return 'y';
  if (s.indexOf('⚠') >= 0) return 'y';
  if (s.indexOf('🎯') >= 0) return 'y';
  var low = s.toLowerCase();
  if (low.indexOf('risk-off') >= 0 || low.indexOf('danger') >= 0 || low.indexOf('alerte') >= 0) return 'r';
  if (low.indexOf('favorable') >= 0 || low.indexOf('ras') >= 0 || low.indexOf('ok') >= 0 || low.indexOf('normal') >= 0) return 'g';
  if (low.indexOf('achat') >= 0 || low.indexOf('porteur') >= 0) return 'g';
  if (low.indexOf('vente') >= 0 || low.indexOf('pression') >= 0) return 'r';
  return 'y';
}
  
function signalEmoji(c) {
  return c === 'g' ? '🟢' : c === 'r' ? '🔴' : '🟡';
}
function tensionClasse(signal) {
  if (!signal) return 'neutral';
  var s = signal.toString();
  if (s.indexOf('🔴') >= 0) return 'danger';
  if (s.indexOf('🟢') >= 0) return '';
  return 'neutral';
}
function couleurVar(cls) {
  return cls === 'g' ? 'green' : cls === 'r' ? 'red' : 'yellow';
}

// ══════════════════════════════════════
//  BARRE DU HAUT + TENSION BAR
// ══════════════════════════════════════

function couleurStatut(statut) {
  if (!statut) return '';
  if (statut.indexOf('🟢') >= 0) return 'up';    // vert
  if (statut.indexOf('🟡') >= 0) return 'neut';  // jaune
  if (statut.indexOf('🔴') >= 0) return 'down';  // rouge
  return '';
}

function libelleSignalCourt(signalGlobal) {
  if (!signalGlobal) return '';
  var s = signalGlobal;
  if (s.indexOf('RISK-OFF') >= 0)      return 'Sortir';
  if (s.indexOf('OPPORTUNITÉ') >= 0)   return 'Signaux positifs';
  if (s.indexOf('PIÈGE') >= 0)         return 'Préparer sortie';
  if (s.indexOf('DIVERGENCE') >= 0)    return 'Divergence';
  if (s.indexOf('NORMAL — Signaux') >= 0) return 'Signaux positifs';
  if (s.indexOf('PRUDENCE') >= 0)      return 'Préparer sortie';
  if (s.indexOf('FAVORABLE') >= 0)     return 'Fenêtre d\'entrée';
  if (s.indexOf('NORMAL') >= 0)        return 'Normal';
  return '';
}
  
function majBarre(ctx) {
  var band = document.getElementById('top-band');
  if (!band) return;

  var tb = document.getElementById('tension-bar');
  if (tb && ctx.signaux) tb.className = tensionClasse(ctx.signaux.global);

  var items = [];

  // CAC 40 : valeur blanche, variation colorée
  if (ctx.cac40) {
    var vc = classeVar(ctx.cac40.variation);
    items.push('<div class="bi"><span class="bi-lbl">CAC 40</span><span class="bi-val">'
      + fmt(ctx.cac40.valeur, 0) + ' <span class="' + vc + '">'
      + (vc === 'up' ? '▲' : '▼') + fmtPct(ctx.cac40.variation) + '</span></span></div>');
  }

  // VIX : valeur colorée selon statut, pastille et texte "CALME" supprimés
  if (ctx.vix) {
    var vixCls = couleurStatut(ctx.vix.statut);
    items.push('<div class="bi"><span class="bi-lbl">VIX</span><span class="bi-val ' + vixCls + '">'
      + fmt(ctx.vix.valeur, 1) + '</span></div>');
  }

  // Anticipation L·E·C (inchangé)
  if (ctx.signaux) {
    var lc = signalClasse(ctx.signaux.leading);
    var ec = signalClasse(ctx.signaux.early);
    var cc = signalClasse(ctx.signaux.coincident);
    items.push('<div class="bi"><span class="bi-lbl">Anticipation L·E·C</span>'
      + '<div class="antici-row"><span class="dot ' + lc + '"></span><span class="antici-lbl">L</span>'
      + '<span class="dot ' + ec + '"></span><span class="antici-lbl">E</span>'
      + '<span class="dot ' + cc + '"></span><span class="antici-lbl">C</span></div></div>');

    // Signal marché : pastille + libellé court
    if (ctx.signaux.global) {
      var libelleCourt = libelleSignalCourt(ctx.signaux.global);
      var emoji = extraireEmoji(ctx.signaux.global);
      items.push('<div class="bi"><span class="bi-lbl">Signal marché</span>'
        + '<span class="band-sig">' + emoji + ' ' + libelleCourt + '</span></div>');
    }
  }

  // BCE : valeur colorée selon statut
  if (ctx.bce) {
    var bceCls = couleurStatut(ctx.bce.statut);
    items.push('<div class="bi"><span class="bi-lbl">BCE</span><span class="bi-val ' + bceCls + '">'
      + fmt(ctx.bce.valeur, 2) + '%</span></div>');
  }

  // OAT : valeur colorée selon statut
  if (ctx.oat) {
    var oatCls = couleurStatut(ctx.oat.statut);
    items.push('<div class="bi"><span class="bi-lbl">OAT 10 ans</span><span class="bi-val ' + oatCls + '">'
      + fmt(ctx.oat.valeur, 2) + '%</span></div>');
  }

  // Brent : valeur colorée selon statut, variation colorée selon signe
  if (ctx.brent) {
    var brentCls = couleurStatut(ctx.brent.statut);
    var brentVarCls = classeVar(ctx.brent.variation);
    items.push('<div class="bi"><span class="bi-lbl">Brent</span><span class="bi-val"><span class="' + brentCls + '">'
      + fmt(ctx.brent.valeur, 1) + '$</span> <span class="' + brentVarCls + '">'
      + (brentVarCls === 'up' ? '▲' : '▼') + fmtPct(ctx.brent.variation) + '</span></span></div>');
  }

  // EUR/USD : valeur colorée selon statut
  if (ctx.eurusd) {
    var eurCls = couleurStatut(ctx.eurusd.statut);
    items.push('<div class="bi"><span class="bi-lbl">EUR/USD</span><span class="bi-val ' + eurCls + '">'
      + fmt(ctx.eurusd.valeur, 3) + '</span></div>');
  }

  band.innerHTML = items.join('');
}

function extraireEmoji(signalGlobal) {
  if (!signalGlobal) return '';
  // Prend juste le premier caractère "visible" (emoji), les emojis colorés font 2 char UTF-16
  var m = signalGlobal.match(/^(\p{Emoji}\uFE0F?|\p{Emoji})/u);
  if (m) return m[0];
  return '';
}

function majPortefeuille(ptf, indic, fonda) {
  var tab = document.getElementById('tab-ptf');
  if (!tab) return;
  indic = indic || {};
  fonda = fonda || {};
  var t = ptf.totaux;
  var pvC = t.pvEuro >= 0 ? 'pos' : 'neg';

  var html = '<div class="ptf-grid">'
    + '<div class="ptf-card"><span class="ptf-label">Investi</span><span class="ptf-val">' + fmtEuro(t.investi) + '</span></div>'
    + '<div class="ptf-card"><span class="ptf-label">Valeur actuelle</span><span class="ptf-val">' + fmtEuro(t.valeur) + '</span></div>'
    + '<div class="ptf-card"><span class="ptf-label">+/- value</span><span class="ptf-val ' + pvC + '">'
    + (t.pvEuro >= 0 ? '+' : '') + fmtEuro(t.pvEuro) + '</span>'
    + '<span class="ptf-sub">' + (t.pvPct >= 0 ? '+' : '') + t.pvPct.toFixed(1) + '%</span></div>'
    + '<div class="ptf-card"><span class="ptf-label">Dividendes perçus</span><span class="ptf-val pos">+' + fmtEuro(t.dividendes) + '</span></div>'
    + '</div>';

  // Allocation
  var couleursPoche = {'Stable':'s','Cyclique':'c','Growth':'g'};
    var pochesTri = ptf.poches || [];
  html += '<div class="alloc-wrap"><div class="alloc-title">Répartition des poches</div><div class="alloc-track">';
  for (var p = 0; p < pochesTri.length; p++) {
    var pc = couleursPoche[pochesTri[p].nom] || 's';
    html += '<div class="alloc-seg ' + pc + '" style="width:' + pochesTri[p].pctValeur.toFixed(0) + '%"></div>';
  }
  html += '</div><div class="alloc-legend">';
  for (var p = 0; p < pochesTri.length; p++) {
    var pc = couleursPoche[pochesTri[p].nom] || 's';
    var ch = pc === 's' ? 'var(--blue)' : pc === 'c' ? 'var(--yellow)' : 'var(--purple)';
    html += '<div class="alloc-li"><div class="alloc-dot" style="background:' + ch + '"></div>' + pochesTri[p].nom + ' ' + pochesTri[p].pctValeur.toFixed(0) + '%</div>';
  }
  html += '</div></div>';

  // Positions par poche
  var pochesOrd = ['Stable', 'Cyclique', 'Growth'];
  for (var pi = 0; pi < pochesOrd.length; pi++) {
    var nomPoche = pochesOrd[pi];
    var pc = couleursPoche[nomPoche] || 's';
    var posP = ptf.positions.filter(function(p) { return p.poche === nomPoche; });
    if (posP.length === 0) continue;
    var tpVal = 0, tpInv = 0;
    for (var j = 0; j < posP.length; j++) {
      tpVal += posP[j].valeurActuelle || 0;
      tpInv += posP[j].investi || 0;
    }
    var tpPct = t.valeur ? (tpVal / t.valeur * 100).toFixed(0) : 0;
    var tpPv = tpInv ? ((tpVal - tpInv) / tpInv * 100) : 0;
    var tpPvCls = tpPv >= 0 ? 'up' : 'down';
    var tpPvSign = tpPv >= 0 ? '+' : '';
    html += '<div class="pocket-block"><div class="pocket-hdr">'
      + '<span class="pocket-name ' + pc + '">◆ ' + nomPoche + '</span>'
      + '<div class="pocket-right"><span class="pocket-pct">' + fmtEuro(tpVal) + ' <span class="' + tpPvCls + '">' + tpPvSign + tpPv.toFixed(1) + '%</span></span>'
      + '<div class="pkt-bar-track"><div class="pkt-bar-fill ' + pc + '" style="width:' + Math.min(100, tpPct * 2) + '%"></div></div>'
      + '</div></div>';
    for (var j = 0; j < posP.length; j++) {
      html += genererCarteValeur(posP[j], indic[posP[j].ticker] || {}, fonda[posP[j].ticker] || {}, pc, nomPoche);
    }
    html += '</div>';
  }
  tab.innerHTML = html;
}

function genererCarteValeur(pos, ind, fon, pocheClass, nomPoche) {
  var varC = classeVar(ind.variationJour);
  var varSymb = varC === 'up' ? '▲+' : '▼−';
  var varVal = (Math.abs(parseFloat(ind.variationJour) || 0) * 100).toFixed(1);
  var sc = pos.pvPct >= 0 ? 'sb' : 'ss';
  var sCls = pos.feuSecteur || signalClasse(ind.signalSectoriel);
  var eCls = pos.feuEntreprise || signalClasse(ind.signalEntreprise);
  var sLbl = ind.signalSectoriel || '—';
  var eLbl = ind.signalEntreprise || '—';

  var stopBar = '';
  if (nomPoche !== 'Stable' && pos.stopLoss && pos.objectif && pos.pru) {
    var stop = pos.stopLoss;
    var pru = pos.pru;
    var obj = pos.objectif;
    var objMax = stop + (obj - stop) * 1.33;
    var range = objMax - stop;
    
    // Position en % sur la barre pour chaque repère
    var posPRU = ((pru - stop) / range * 100).toFixed(1);
    var posObj = ((obj - stop) / range * 100).toFixed(1);
    var posObjMax = 100;
  
    // Position du cours actuel, borné entre 0 et 100
    var cursor = ((pos.cours - stop) / range * 100);
    cursor = Math.max(0, Math.min(100, cursor));
  
    var sw = pos.statutStop && pos.statutStop.toString().toLowerCase().indexOf('proche') >= 0;
  
    stopBar = '<div class="slbar-wrap">'
      + '<div class="slbar-track">'
      // Curseur cours actuel
      + '<div class="sl-cursor" style="left:' + cursor.toFixed(1) + '%" title="Cours ' + fmt(pos.cours, 2) + '€"></div>'
      // Repère Stop
      + '<div class="slbar-marker" style="left:0%"></div>'
      + '<span class="slbar-marker-label bot" style="left:0%">' + (sw ? '⚠ ' : '') + 'Stop ' + fmt(stop, 0) + '€</span>'
      // Repère PRU
      + '<div class="slbar-marker" style="left:' + posPRU + '%"></div>'
      + '<span class="slbar-marker-label top" style="left:' + posPRU + '%">PRU ' + fmt(pru, 0) + '€</span>'
      // Repère Objectif
      + '<div class="slbar-marker" style="left:' + posObj + '%"></div>'
      + '<span class="slbar-marker-label bot" style="left:' + posObj + '%">Obj ' + fmt(obj, 0) + '€</span>'
      // Repère Objectif +33%
      + '<div class="slbar-marker" style="left:100%"></div>'
      + '<span class="slbar-marker-label top" style="left:100%">+33% ' + fmt(objMax, 0) + '€</span>'
      + '</div>'
      + '</div>';
  } else {
    stopBar = '<span class="no-stop">Poche stable — pas de stop loss</span>';
  }
  function barScore(label, val) {
    if (val === null || val === undefined || val === '') return '<div class="sitem"><span class="slbl">' + label + '</span><div class="srow"><div class="strack"><div class="sfill" style="width:0"></div></div><span class="sval" style="color:var(--dim)">—</span></div></div>';
    var w = (Math.min(1.5, Math.max(0, parseFloat(val))) / 1.5 * 100).toFixed(0);
    var c = parseFloat(val) < 0.7 ? 'g' : parseFloat(val) < 1.1 ? 'y' : 'r';
    return '<div class="sitem"><span class="slbl">' + label + '</span><div class="srow"><div class="strack"><div class="sfill ' + c + '" style="width:' + w + '%"></div></div><span class="sval ' + c + '">' + fmt(val, 2) + '</span></div></div>';
  }

  var fi = [['PER',fon.per?fmt(fon.per,1)+'×':'—'],['EV/CA',fon.evCA?fmt(fon.evCA,1)+'×':'—'],
    ['Dette/EBITDA',fon.detteEbitda?fmt(fon.detteEbitda,1)+'×':'—'],['Div',fon.rendementDiv?fmt(fon.rendementDiv*100,1)+'%':'—'],
    ['ROE',fon.roe?fmt(fon.roe*100,1)+'%':'—'],['Bêta',fon.beta?fmt(fon.beta,2):'—']];
  var fHtml = '<div class="fgrid">';
  for (var f = 0; f < fi.length; f++) fHtml += '<div class="fi"><span class="flbl">' + fi[f][0] + '</span><span class="fval">' + fi[f][1] + '</span></div>';
  fHtml += '</div>';

  var id = pos.ticker.replace('.PA','').replace('.','');
  var sn = (pos.nom || '').replace(/'/g, '');

  return '<div class="vc ' + sc + ' pocket-' + pocheClass + '" id="c-' + id + '" onclick="toggleCard(\'c-' + id + '\')">'
    + '<div class="vr1"><div class="vl"><span class="vname">' + pos.nom + '</span>'
    + '<span class="vtick">' + pos.ticker + ' · ' + (pos.secteur || '') + ' · ' + (pos.quantite || 0) + ' actions</span></div>'
    + '<div class="vright"><span class="vcours">' + fmtEuro(pos.cours) + '</span>'
    + '<span class="vvar ' + varC + '">' + varSymb + varVal + '%</span></div></div>'
    + '<div class="vr2"><span class="pv ' + (pos.pvPct >= 0 ? 'pos' : 'neg') + '">'
    + fmtPct(pos.pvPct) + ' · ' + (pos.pvEuro >= 0 ? '+' : '') + fmtEuro(pos.pvEuro) + '</span>'
    + '<div class="spills"><span class="sp ' + sCls + '"><span class="sd" style="background:var(--' + couleurVar(sCls) + ')"></span>Sect. ' + sLbl + '</span>'
    + '<span class="sp ' + eCls + '"><span class="sd" style="background:var(--' + couleurVar(eCls) + ')"></span>Ent. ' + eLbl + '</span></div></div>'
    + '<div class="vr3">' + stopBar + '</div>'
    + '<div class="vdetail" id="d-' + id + '">'
    + '<div class="chart-embed-controls" id="cc-' + id + '"><div class="chart-ctrl-group">'
    + '<button class="chart-ctrl" onclick="event.stopPropagation();changerRangeEmbed(\'' + pos.ticker + '\',\'' + id + '\',\'1mo\',this)">1M</button>'
    + '<button class="chart-ctrl active" onclick="event.stopPropagation();changerRangeEmbed(\'' + pos.ticker + '\',\'' + id + '\',\'3mo\',this)">3M</button>'

var wlFiltreActuel = 'all';

function majWatchlist(wl, indic, fonda) {
  try {
    var container = document.getElementById('wl-list-container');
    var header = document.getElementById('wl-sticky-header');
    var countEl = document.getElementById('wl-count-val');
    var sel = document.getElementById('wl-filter-select');
    if (!container) return;

    var compteursServ = null;
    if (wl && wl.items) {
      compteursServ = wl.compteurs;
      wl = wl.items;
    }
    indic = indic || {};
    fonda = fonda || {};

    if (wl.length === 0) {
      container.innerHTML = '<div class="empty-tab"><span class="e-icon">🔭</span><span class="e-title">Watchlist vide</span></div>';
      if (header) header.style.display = 'none';
      return;
    }

    // Mettre à jour le header
    if (header) {header.style.display = '';container.style.marginTop = (header.offsetHeight + 60) + 'px';}
    if (countEl) countEl.textContent = wl.length;

    var compteurs = compteursServ || { all: wl.length, enter: 0, watch: 0, hunter: 0, neutral: 0, blocked: 0, wait: 0 };

    // Mettre à jour le select
    if (sel) {
      sel.innerHTML = ''
        + '<option value="all">Tous (' + compteurs.all + ')</option>'
        + '<option value="enter">🟢 Entrer (' + compteurs.enter + ')</option>'
        + '<option value="hunter">🎯 Chasseur (' + compteurs.hunter + ')</option>'
        + '<option value="watch">👁 Surveiller (' + compteurs.watch + ')</option>'
        + '<option value="neutral">⚪ Neutre (' + compteurs.neutral + ')</option>'
        + '<option value="blocked">🚫 Éviter (' + compteurs.blocked + ')</option>';
      sel.value = wlFiltreActuel;
    }

    var mCls = 'y';
    if (peaData && peaData.contexte && peaData.contexte.signaux) mCls = signalClasse(peaData.contexte.signaux.global);

    var html = '<div class="wl-list">';
    var affichees = 0;
    for (var i = 0; i < wl.length; i++) {
      var resultCls = wl[i].recommandation ? wl[i].recommandation.cls : 'neutral';
      if (wlFiltreActuel !== 'all' && resultCls !== wlFiltreActuel) continue;
      html += genererCarteWL(wl[i], indic[wl[i].ticker] || {}, fonda[wl[i].ticker] || {});
      affichees++;
    }
    if (affichees === 0) {
      html += '<div style="opacity:.6;padding:20px;text-align:center">Aucune valeur dans cette catégorie</div>';
    }
    html += '</div>';
    container.innerHTML = html;

  } catch(e) {
    console.error('WL erreur:', e);
    var container = document.getElementById('wl-list-container');
    if (container) container.innerHTML = '<div style="color:var(--red);padding:20px;font-family:var(--mono)">Erreur WL: ' + e.message + '</div>';
  }
}

function chargerGraphiqueEmbed(ticker, id, range, type) {
  range = range || '3mo';
  type = type || 'line';
  chartMeta[id] = {ticker:ticker, range:range, type:type};
  var container = document.getElementById('ce-' + id);
  if (!container) return;

  // Utiliser le cache si disponible
  var cacheKey = ticker + '_' + range;
  if (chartCache[cacheKey]) {
    dessinerEmbed(id, chartCache[cacheKey], type);
    return;
  }

  container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-family:var(--mono);font-size:11px">⏳</div>';
  fetch(urlAPI('?action=historique&ticker=' + encodeURIComponent(ticker) + '&range=' + range))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.data || data.data.length === 0) {
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--red);font-family:var(--mono);font-size:11px">Pas de données</div>';
        return;
      }
      chartCache[cacheKey] = data.data;
      dessinerEmbed(id, data.data, type);
    })
    .catch(function(err) {
      container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--red);font-family:var(--mono);font-size:11px">' + err.message + '</div>';
    });
}

function dessinerEmbed(id, rawData, type) {
  if (typeof LightweightCharts === 'undefined') {
    var c = document.getElementById('ce-' + id);
    if (c) c.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--yellow);font-family:var(--mono);font-size:11px">📊 Chargement librairie...</div>';
    setTimeout(function() { dessinerEmbed(id, rawData, type); }, 500);
    return;
  }
  var container = document.getElementById('ce-' + id);
  if (!container) return;
  container.innerHTML = '';
  if (chartInstances[id]) { chartInstances[id].remove(); }
  var points = rawData.map(function(d) {
    var dt = new Date(d.time * 1000);
    return {time: dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'),
      open:d.open, high:d.high, low:d.low, close:d.close};
  });
  chartInstances[id] = LightweightCharts.createChart(container, {
    width: container.offsetWidth, height: container.offsetHeight,
    layout: {background:{type:'solid',color:'transparent'}, textColor:'#8b949e', fontSize:9, fontFamily:'SF Mono,Fira Code,monospace'},
    grid: {vertLines:{color:'rgba(255,255,255,.03)'}, horzLines:{color:'rgba(255,255,255,.03)'}},
    crosshair: {mode: LightweightCharts.CrosshairMode.Magnet},
    rightPriceScale: {borderColor:'rgba(255,255,255,.08)'},
    timeScale: {borderColor:'rgba(255,255,255,.08)'},
    handleScroll: {vertTouchDrag: false}
  });
  if (type === 'candle') {
    var cs = chartInstances[id].addCandlestickSeries({upColor:'#3fb950',downColor:'#f85149',borderUpColor:'#3fb950',borderDownColor:'#f85149',wickUpColor:'#3fb950',wickDownColor:'#f85149'});
    cs.setData(points);
  } else {
    var ls = chartInstances[id].addAreaSeries({lineColor:'#58a6ff',topColor:'rgba(88,166,255,.2)',bottomColor:'rgba(88,166,255,.01)',lineWidth:2});
    ls.setData(points.map(function(p){return{time:p.time,value:p.close};}));
  }
  var closes = points.map(function(p){return p.close;});
  var mm20 = calculerMM(points, closes, 20);
  if (mm20.length > 0) {
    var m20 = chartInstances[id].addLineSeries({color:'#58a6ff',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
    m20.setData(mm20);
  }
  var mm50 = calculerMM(points, closes, 50);
  if (mm50.length > 0) {
    var m50 = chartInstances[id].addLineSeries({color:'#d29922',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
    m50.setData(mm50);
  }
  var boll = calculerBollinger(points, closes, 20);
  if (boll.upper.length > 0) {
    chartInstances[id].addLineSeries({color:'rgba(88,166,255,.15)',lineWidth:1,priceLineVisible:false,lastValueVisible:false}).setData(boll.upper);
    chartInstances[id].addLineSeries({color:'rgba(88,166,255,.15)',lineWidth:1,priceLineVisible:false,lastValueVisible:false}).setData(boll.lower);
  }
  chartInstances[id].timeScale().fitContent();
}

function changerRangeEmbed(ticker, id, range, btn) {
  var meta = chartMeta[id] || {};
  var grp = btn.closest('.chart-ctrl-group');
  grp.querySelectorAll('.chart-ctrl').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  chargerGraphiqueEmbed(ticker, id, range, meta.type || 'line');
}

function changerTypeEmbed(ticker, id, type, btn) {
  var meta = chartMeta[id] || {};
  var grp = btn.closest('.chart-ctrl-group');
  grp.querySelectorAll('.chart-ctrl').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  chargerGraphiqueEmbed(ticker, id, meta.range || '3mo', type);
}

function calculerMM(points, closes, period) {
  var r = [];
  for (var i = period-1; i < closes.length; i++) {
    var s = 0;
    for (var j = i-period+1; j <= i; j++) s += closes[j];
    r.push({time: points[i].time, value: s / period});
  }
  return r;
}

function calculerBollinger(points, closes, period) {
  var u = [], l = [];
  for (var i = period-1; i < closes.length; i++) {
    var s = 0;
    for (var j = i-period+1; j <= i; j++) s += closes[j];
    var mm = s / period;
    var sq = 0;
    for (var j = i-period+1; j <= i; j++) sq += (closes[j]-mm)*(closes[j]-mm);
    var sig = Math.sqrt(sq / period);
    u.push({time:points[i].time, value:mm+2*sig});
    l.push({time:points[i].time, value:mm-2*sig});
  }
  return {upper:u, lower:l};
}

var txType = '';

function openTx(type, ticker, name) {
  txType = type;

  document.getElementById('tx-subtitle').textContent = ticker + ' · ' + name;
  document.getElementById('tx-qty').value = '';
  document.getElementById('tx-price').value = '';
  document.getElementById('tx-total').textContent = '—';
  document.getElementById('tx-note').value = '';

  // Date du jour
  var now = new Date();
  var ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  document.getElementById('tx-date').value = ds;

  // Titre et style
  var title = document.getElementById('tx-title');
  var btn = document.getElementById('tx-submit');
  var hint = document.getElementById('tx-div-hint');
  var ql = document.getElementById('tx-qty-label');
  var pl = document.getElementById('tx-price-label');
  var cyclo = document.getElementById('tx-cyclo-fields');

  if (type === 'Achat') {
    title.textContent = '🛒 Nouvel achat';
    btn.className = 'tx-submit buy';
    btn.textContent = 'Confirmer l\u2019achat';
    hint.style.display = 'none';
    ql.textContent = 'Quantité';
    pl.textContent = 'Prix unitaire (€)';
  } else if (type === 'Vente') {
    title.textContent = '💸 Nouvelle vente';
    btn.className = 'tx-submit sell';
    btn.textContent = 'Confirmer la vente';
    hint.style.display = 'none';
    ql.textContent = 'Quantité';
    pl.textContent = 'Prix unitaire (€)';
  } else {
    title.textContent = '💰 Enregistrer un dividende';
    btn.className = 'tx-submit dividend';
    btn.textContent = 'Confirmer le dividende';
    hint.style.display = 'block';
    ql.textContent = 'Nb actions';
    pl.textContent = 'Montant/action (€)';
  }

  // Champs objectif/durée pour Achat en poche cyclique ou growth
  var showCyclo = false;
  if (type === 'Achat') {
    var poche = trouverPoche(ticker);
    var pl2 = (poche || '').toLowerCase();
    if (pl2.indexOf('cycl') >= 0 || pl2.indexOf('grow') >= 0) {
      showCyclo = true;

      // Préremplir l'objectif depuis la dernière transaction connue
      var objField = document.getElementById('tx-objectif');
      var durField = document.getElementById('tx-duree');
      var dernierObj = trouverDernierObjectif(ticker);

      if (dernierObj.locked && dernierObj.objectif) {
        objField.value = dernierObj.objectif;
        objField.readOnly = true;
        objField.style.opacity = '0.6';
        objField.title = 'Objectif figé au dernier achat';
      } else {
        objField.value = dernierObj.objectif || '';
        objField.readOnly = false;
        objField.style.opacity = '1';
        objField.title = '';
      }
      durField.value = dernierObj.duree || '';
    }
  }
  cyclo.style.display = showCyclo ? '' : 'none';
  txModalOuvert = true;
  
  document.getElementById('tx-overlay').classList.add('open');
}

function trouverDernierObjectif(ticker) {
  if (peaData && peaData.portefeuille && peaData.portefeuille.positions) {
    for (var i = 0; i < peaData.portefeuille.positions.length; i++) {
      var pos = peaData.portefeuille.positions[i];
      if (pos.ticker !== ticker) continue;
      var qte = parseFloat(pos.quantite) || 0;
      var pru = parseFloat(pos.pru) || 0;
      var obj = parseFloat(pos.objectif) || 0;
      if (qte > 0 && pru > 0 && obj > 0) {
        var pct = Math.round(((obj / pru) - 1) * 100);
        var duree = pos.joursRestants ? Math.ceil(pos.joursRestants / 7).toString() : '';
        return { objectif: pct.toString(), duree: duree, locked: true };
      }
    }
  }
  return { objectif: '', duree: '', locked: false };
}

function positionExiste(ticker) {
  if (peaData && peaData.portefeuille && peaData.portefeuille.positions) {
    for (var i = 0; i < peaData.portefeuille.positions.length; i++) {
      var pos = peaData.portefeuille.positions[i];
      if (pos.ticker === ticker) {
        var q = parseFloat(pos.quantite) || 0;
        if (q > 0) return true;
      }
    }
  }
  return false;
}

function closeTx() {

function trouverPoche(ticker) {
  if (!peaData) return '';
  // Chercher dans portefeuille
  if (peaData.portefeuille && peaData.portefeuille.positions) {
    for (var i = 0; i < peaData.portefeuille.positions.length; i++) {
      if (peaData.portefeuille.positions[i].ticker === ticker) return peaData.portefeuille.positions[i].poche;
    }
  }
  // Chercher dans watchlist
  if (peaData.watchlist) {
  var wlItems = peaData.watchlist.items || peaData.watchlist;
  for (var i = 0; i < wlItems.length; i++) {
    if (wlItems[i].ticker === ticker) return wlItems[i].poche;
  }
}
  return '';
}

// Auto-scroll infini du bandeau (compatible mobile)
(function() {
  var band = document.getElementById('top-band');
  if (!band) return;
  var paused = false;
  var speed = 0.5;
  var pos = 0;

  function dupliquer() {
    var clone = band.innerHTML;
    band.innerHTML = '<div style="display:flex;flex-shrink:0">' + clone + '</div><div style="display:flex;flex-shrink:0">' + clone + '</div>';
    band.style.overflow = 'hidden';
  }

  var obs = new MutationObserver(function() {
    obs.disconnect();
    if (band.children.length < 2 || !band.children[1].style.flexShrink) {
      dupliquer();
      pos = 0;
    }
    obs.observe(band, {childList: true});
  });
  obs.observe(band, {childList: true});

  function tick() {
    if (!paused && band.children.length > 0) {
      var half = band.scrollWidth / 2;
      if (half > 0) {
        pos += speed;
        if (pos >= half) pos -= half;
        // transform au lieu de scrollLeft → fonctionne en overflow:hidden
        if (band.children[0]) band.children[0].style.transform = 'translateX(-' + pos + 'px)';
        if (band.children[1]) band.children[1].style.transform = 'translateX(-' + pos + 'px)';
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  band.addEventListener('touchstart', function() { paused = true; }, {passive: true});
  band.addEventListener('touchend', function() { paused = false; }, {passive: true});
  band.addEventListener('mousedown', function() { paused = true; });
  band.addEventListener('mouseup', function() { paused = false; });
  band.addEventListener('mouseleave', function() { paused = false; });
})();

function majSignaux(signaux) {
// Sauvegarder le filtre actif
  var filtreActif = 'all';
  var ancienBtn = document.querySelector('.sig-filters .sig-filter.active');
  if (ancienBtn) {
    var oc = ancienBtn.getAttribute('onclick') || '';
    var m = oc.match(/filterSig\('([^']+)'/);
    if (m) filtreActif = m[1];
  }
  var tab = document.getElementById('tab-sig');
  if (!tab) return;

  // Séparer actifs et traités
  var actifs = [];
var traites = [];

for (var i = 0; i < signaux.length; i++) {
  var s = signaux[i];

  if (s.traite) {
    var t = s.traite.toString().toLowerCase();

    // ✅ on exclut les signaux écrasés
    if (t.indexOf('écrasé') >= 0 || t.indexOf('remplacé') >= 0) {
      continue;
    }
    if (t.indexOf('auto') >= 0) continue;

    traites.push(s);
  } else {
    actifs.push(s);
  }
}

// Tri automatique basé sur la priorité renvoyée par l'API
actifs.sort(function(a, b) {
  var pa = a.ordrePoche !== undefined ? a.ordrePoche : 9;
  var pb = b.ordrePoche !== undefined ? b.ordrePoche : 9;
  if (pa !== pb) return pa - pb;

  var ta = a.priorite !== undefined ? a.priorite : 99;
  var tb = b.priorite !== undefined ? b.priorite : 99;
  if (ta !== tb) return ta - tb;

  return (b.date || '').localeCompare(a.date || '');
});

// Historique traité : plus récent en premier
traites.sort(function(a, b) {
  return (b.date || '').localeCompare(a.date || '');
});

  // Mettre à jour le badge dans la nav
  var badge = document.querySelector('.nav-badge');
  if (badge) {
  if (actifs.length > 0) {
    badge.textContent = actifs.length;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

  if (actifs.length === 0 && traites.length === 0) {
    tab.innerHTML = '<div class="empty-tab"><span class="e-icon">🚨</span><span class="e-title">Aucun signal</span><span class="e-sub">Tout est calme pour l\'instant.</span></div>';
    return;
  }

  var html = '<div class="sig-header"><span class="sig-count">🚨 <span>' + actifs.length + '</span> alerte' + (actifs.length > 1 ? 's' : '') + '</span></div>';

  // Filtres
  html += '<div class="sig-filters">'
    + '<button class="sig-filter active" onclick="filterSig(\'all\',this)">Tous</button>'
    + '<button class="sig-filter" onclick="filterSig(\'pos\',this)">🔴 Position</button>'
    + '<button class="sig-filter" onclick="filterSig(\'opp\',this)">🔵 Opportunité</button>'
    + '</div>';

  // Signaux actifs
  if (actifs.length > 0) {
    html += '<div class="sig-section-title"><span class="sig-dot" style="background:var(--red)"></span>Actifs</div>';
    for (var i = 0; i < actifs.length; i++) {
      html += genererCarteSig(actifs[i], false);
    }
  }

  // Historique
  if (traites.length > 0) {
    html += '<button class="sig-history-toggle" onclick="toggleSigHistory()">📋 Historique (' + traites.length + ') ▼</button>';
    html += '<div class="sig-history" id="sig-history">';
    html += '<div class="sig-section-title"><span class="sig-dot" style="background:var(--dim)"></span>Traités</div>';
    for (var i = 0; i < traites.length; i++) {
      html += genererCarteSig(traites[i], true);
    }
    html += '</div>';
  }

  tab.innerHTML = html;
  
  // Restaurer le filtre actif
  if (filtreActif !== 'all') {
    var btns = tab.querySelectorAll('.sig-filters .sig-filter');
    for (var b = 0; b < btns.length; b++) {
      var oc = btns[b].getAttribute('onclick') || '';
      if (oc.indexOf("'" + filtreActif + "'") >= 0) {
        filterSig(filtreActif, btns[b]);
        break;
      }
    }
  }
}

function genererCarteSig(sig, traite) {
  var type = (sig.type || '').toLowerCase();

  var barCls    = sig.cssClass   || 'sig-y';
  var badgeCls  = sig.badgeClass || 'y';
  var badgeIcon = sig.badgeIcon  || sig.type || '—';

  // Date formatée
  var dateStr = sig.date || '';
  if (dateStr) {
    var dp = new Date(dateStr);
    if (!isNaN(dp.getTime())) {
      var mois = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
      dateStr = dp.getDate() + ' ' + mois[dp.getMonth()];
    }
  }

  // Détail selon le type (ligne 4)
  var detail = sig.detail || '—';

  var sn = (sig.nom || '').replace(/'/g, '');
  var dateISO = sig.date || '';

  // Carte traitée

      + '<span class="sig-badge done">' + badgeIcon + '</span>'
      + '<span class="sig-treated-lbl">✅ ' + sig.traite + '</span></div>'
      + '</div>';
  }

  // Boutons d'action
  var actionBtns = '';
  if (type.indexOf('dividende') >= 0) {
    var vdEsc = (sig.valeurDeclenchante || '').toString().replace(/'/g, '');
    actionBtns = '<button class="btn-treat dividend" onclick="ouvrirDividendeSig(\'' + sig.ticker + '\',\'' + sn + '\',\'' + vdEsc + '\')">💰 Enregistrer le dividende</button>';
  } else {
    actionBtns = '<button class="btn-treat primary" onclick="traiterSignal(\'' + sig.ticker + '\',\'' + dateISO + '\')">✅ Traiter</button>';
  }

  return '<div class="sig-card ' + barCls + '" data-cat="' + cat + '">'
    + '<div class="sig-top"><div class="sig-left"><span class="sig-name">' + (sig.nom || sig.ticker) + '</span>'
    + '<span class="sig-tick">' + sig.ticker + '</span></div>'
    + '<span class="sig-date">' + dateStr + '</span></div>'
    + '<span class="sig-badge ' + badgeCls + '">' + badgeIcon + '</span>'
    + '<div class="sig-detail">' + detail + '</div>'
    + '<div class="sig-action-row"><span class="sig-action-lbl">' + (sig.actionRecommandee || '') + '</span>'
    + actionBtns + '</div>'
    + '</div>';

// --- Ouvrir le formulaire dividende prérempli ---
function ouvrirDividendeSig(ticker, nom, valeurDeclenchante) {
  openTx('Dividende', ticker, nom);

  // Préremplir le nombre d'actions depuis le portefeuille
  if (peaData && peaData.portefeuille && peaData.portefeuille.positions) {
    for (var i = 0; i < peaData.portefeuille.positions.length; i++) {
      var pos = peaData.portefeuille.positions[i];
      if (pos.ticker === ticker) {
        document.getElementById('tx-qty').value = pos.quantite || '';
        break;
      }
    }
  }

  // Préremplir le montant du dividende
  var montant = 0;

  // 1) D'abord depuis la valeur déclenchante du signal (colonne F)
  if (valeurDeclenchante) {
    var parsed = parseFloat(valeurDeclenchante.toString().replace(',', '.').replace(/[^0-9.\-]/g, ''));
    if (!isNaN(parsed) && parsed > 0) montant = parsed;
  }

  // 2) Sinon depuis les fondamentaux (dividende N)
  if (!montant && peaData && peaData.fondamentaux && peaData.fondamentaux[ticker]) {
    var fon = peaData.fondamentaux[ticker];
    if (fon.divN && parseFloat(fon.divN) > 0) montant = parseFloat(fon.divN);
  }

  if (montant > 0) {
    document.getElementById('tx-price').value = montant.toFixed(4);
    var q = parseFloat(document.getElementById('tx-qty').value) || 0;
    if (q) {
      document.getElementById('tx-total').textContent = (q * montant).toLocaleString('fr-FR', {minimumFractionDigits: 2}) + ' €';
    }
  }
}
