  var tab = document.getElementById('cal-content');
  if (!tab) return;

  var y = calDate.getFullYear();
  var m = calDate.getMonth();

  var moisNom = [
    'Janvier','Février','Mars','Avril','Mai','Juin',
    'Juillet','Août','Septembre','Octobre','Novembre','Décembre'
  ];

  var jours = ['LUN','MAR','MER','JEU','VEN','SAM','DIM'];

  var html = '';

  // Header mois
  html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 15px">';
  html += '<div style="font-weight:600">📅 ' + moisNom[m] + ' ' + y + '</div>';
  html += '<div>';
  html += '<button onclick="changerMois(-1)">◀</button>';
  html += '<div style="width:16px;display:inline-block"></div>';
  html += '<button onclick="changerMois(1)">▶</button>';
  html += '</div></div>';

  // semaine
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:0 10px">';
  for (var i = 0; i < jours.length; i++) {
    html += '<div style="font-size:10px;color:var(--dim)">' + jours[i] + '</div>';
  }

  var first = new Date(y, m, 1);
  var start = first.getDay();
  var offset = start === 0 ? 6 : start - 1;

  var nbDays = new Date(y, m + 1, 0).getDate();

  for (var i = 0; i < offset; i++) {
    html += '<div></div>';
  }

  var today = new Date();
  today.setHours(0,0,0,0);

  var eventsAffiches = filtrerEvenementsCal(calEvents);

  for (var d = 1; d <= nbDays; d++) {
    var dateObj = new Date(y, m, d);
    dateObj.setHours(0,0,0,0);

    var iso = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');

    var eventsAffiches = filtrerEvenementsCal(calEvents);
    var ev = eventsAffiches.filter(function(e){ return e.date === iso });

    var style = 'padding:8px;border:1px solid var(--border);border-radius:6px;cursor:pointer;';

    if (dateObj.getTime() === today.getTime()) {
      style += 'border-color:var(--green);';
    }

    if (calSelectedDate === iso) {
      style += 'border:2px solid var(--blue);';
    }

    html += '<div data-day="' + iso + '" style="' + style + '" onclick="selectCalDay(\'' + iso + '\')">';
    html += '<div>' + d + '</div>';

    // points événements : 1 point par catégorie de couleur
    if (ev.length) {
      var couleursDejaVues = {};
      var pointsHTML = '';
      for (var e = 0; e < ev.length; e++) {
        var c = couleurEvent(ev[e]);
        if (couleursDejaVues[c]) continue;
        couleursDejaVues[c] = true;
        pointsHTML += '<div style="width:6px;height:6px;border-radius:50%;background:' + c + '"></div>';
      }
      html += '<div style="margin-top:4px;display:flex;gap:4px">' + pointsHTML + '</div>';
    }

    html += '</div>';
  }

  html += '</div>';

  // Légende
  html += '<div style="display:flex;gap:12px;justify-content:center;padding:10px 15px;font-size:10px;color:var(--dim);font-family:var(--mono);flex-wrap:wrap;">';
  html += '<div style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#58a6ff;"></span>Ticker</div>';
  html += '<div style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#3fb950;"></span>Macro</div>';
  html += '<div style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#a371f7;"></span>Sectoriel</div>';
  html += '<div style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#f0883e;"></span>Système</div>';
  html += '</div>';

  // détail
  html += '<div id="cal-detail" style="padding:10px 15px;font-size:12px"></div>';
  
  tab.innerHTML = html;

  // ✅ restaurer la sélection après refresh
  if (calSelectedDate) {
    selectCalDay(calSelectedDate);
  }
}  

function changerMois(delta) {
  calDate.setMonth(calDate.getMonth() + delta);
  renderCalSimple();
}

function couleurEvent(e) {
  var poche = (e.poche || '').toLowerCase();

  // Système → orange
  if (poche.indexOf('système') >= 0 || poche.indexOf('systeme') >= 0) {
    return '#f0883e'; // orange
  }
  // Macro → vert
  if (poche.indexOf('macro') >= 0) {
    return '#3fb950'; // vert
  }
  // Événement ticker (poche = Stable/Cyclique/Growth)
  if (poche.indexOf('stable') >= 0 || poche.indexOf('cycl') >= 0 || poche.indexOf('grow') >= 0) {
    return '#58a6ff'; // bleu
  }
  // Sinon → sectoriel (violet)
  return '#a371f7'; // violet
}

function selectCalDay(dateISO) {
  calSelectedDate = dateISO;

  // ✅ 1. Retirer le liseré bleu de l’ancien jour
  document.querySelectorAll('[data-day]').forEach(function(cell){
    var d = cell.getAttribute('data-day');
    var today = new Date();
    today.setHours(0,0,0,0);

    var dObj = new Date(d + 'T00:00:00');
    dObj.setHours(0,0,0,0);

    if (dObj.getTime() === today.getTime()) {
      // garde le vert pour aujourd’hui
      cell.style.border = '1px solid var(--green)';
    } else {
      cell.style.border = '1px solid var(--border)';
    }
  });

  // ✅ 2. Ajouter le liseré bleu sur le nouveau jour
  var sel = document.querySelector('[data-day="' + dateISO + '"]');
  if (sel) {
    sel.style.border = '2px solid var(--blue)';
  }

  // ✅ 3. Mettre à jour le détail (comme avant)
  var div = document.getElementById('cal-detail');
  if (!div) return;

  var eventsAffiches = filtrerEvenementsCal(calEvents);
  var ev = eventsAffiches.filter(function(e){ return e.date === dateISO });

  if (!ev.length) {
    div.innerHTML = 'Aucun événement';
    return;
  }

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var html = '<b>' + dateISO + '</b><br><br>';

  for (var i = 0; i < ev.length; i++) {
    var e = ev[i];

    // Construction du libellé : type + nom entreprise (si présent) + description (si présente)
    var parts = [];
    if (e.type)                        parts.push(e.type);
    if (e.nom && e.nom.trim())         parts.push(e.nom.trim());
    if (e.description && e.description.trim()) parts.push(e.description.trim());
    html += '• ' + parts.join(' — ') + '<br>';

    if (e.type && e.type.toLowerCase().indexOf('pmi') >= 0) {
      var d = new Date(e.date + 'T00:00:00');
      d.setHours(0, 0, 0, 0);

      if (d <= today) {
        html += '<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">';
        html += '<button onclick="ouvrirModalePMI(\'' + e.date + '\')">📊 Mettre à jour PMI</button>';
        html += '</div>';
      }
    }
    if (e.type && e.type.toLowerCase().indexOf('maj dates salons') >= 0) {
      var dS = new Date(e.date + 'T00:00:00');
      dS.setHours(0, 0, 0, 0);
      if (dS <= today) {
        html += '<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">';
        html += '<button onclick="ouvrirModaleSalons(\'' + e.date + '\')">🎪 Saisir les dates des salons</button>';
        html += '</div>';
      }
    }
    if (e.type && e.type.toLowerCase().indexOf('maj dates fomc') >= 0) {
      var dF = new Date(e.date + 'T00:00:00');
      dF.setHours(0, 0, 0, 0);
      if (dF <= today) {
        html += '<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">';
        html += '<button onclick="ouvrirModaleFOMC(\'' + e.date + '\')">🏦 Saisir les dates FOMC</button>';
        html += '</div>';
      }
    }
    if (e.type && e.type.toLowerCase().indexOf('maj dates opep') >= 0) {
      var dO = new Date(e.date + 'T00:00:00');
      dO.setHours(0, 0, 0, 0);
      if (dO <= today) {
        html += '<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">';
        html += '<button onclick="ouvrirModaleOPEP(\'' + e.date + '\')">🛢️ Saisir les dates OPEP+</button>';
        html += '</div>';
      }
    }
    
    html += '<br>';
  }

  div.innerHTML = html;
}

function pmiEnAttente(events) {
  if (!events || !events.length) return false;

  var today = new Date();
  today.setHours(0,0,0,0);

  for (var i = 0; i < events.length; i++) {
    var e = events[i];

    if (!e.type || e.type.toLowerCase().indexOf('pmi') < 0) continue;

    var d = new Date(e.date + 'T00:00:00');
    d.setHours(0,0,0,0);

    if (d <= today) {
      var key = 'pmi_done_' + e.date;

      if (!localStorage.getItem(key)) {
        return true; // ✅ action à faire
      }
    }
  }

  return false;
}

function nbPmiEnAttente(events) {
  if (!events || !events.length) return 0;

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  for (var i = 0; i < events.length; i++) {
    var e = events[i];
    if (!e.type || e.type.toLowerCase().indexOf('pmi') < 0) continue;

    var d = new Date(e.date + 'T00:00:00');
    d.setHours(0, 0, 0, 0);

    if (d <= today && !localStorage.getItem('pmi_done_' + e.date)) {
      return 1; // au moins un PMI en attente = pastille +1
    }
  }

  return 0;
}

function majBadgeCalendrier(events) {
  var btn = document.querySelector(".nav-btn[onclick*=\"'cal'\"]");
  if (!btn) return;

  var badge = btn.querySelector('.nav-badge-cal');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'nav-badge nav-badge-cal';
    btn.appendChild(badge);
  }

  var nbPMI    = nbPmiEnAttente(events);
  var nbSalons = nbMajEnAttente(events, 'maj dates salons', 'salons_done_');
  var nbFOMC   = nbMajEnAttente(events, 'maj dates fomc',   'fomc_done_');
  var nbOPEP   = nbMajEnAttente(events, 'maj dates opep',   'opep_done_');

  var nb = nbPMI + nbSalons + nbFOMC + nbOPEP;

  if (nb > 0) {
    badge.textContent = String(nb);
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

/**
 * Compte le nombre d'événements "MAJ dates X" en attente de saisie.
 * Un événement est en attente si :
 *   - sa date est <= aujourd'hui
 *   - il n'a pas été marqué comme traité en localStorage
 */
function nbMajEnAttente(events, typeContains, prefixeDone) {
  if (!events || !events.length) return 0;

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var nb = 0;
  for (var i = 0; i < events.length; i++) {
    var e = events[i];
    if (!e.type || e.type.toLowerCase().indexOf(typeContains) < 0) continue;

    var d = new Date(e.date + 'T00:00:00');
    d.setHours(0, 0, 0, 0);

    if (d <= today && !localStorage.getItem(prefixeDone + e.date)) {
      nb++;
    }
  }

  return nb;
}

function enregistrerPMI(dateISO) {
  var pmis = ['france', 'euro', 'chine', 'nbs'];
  var payload = {};
  var manquantes = [];

  pmis.forEach(function(cle) {
    var val = document.getElementById('pmi-' + cle).value;
    if (val === '') {
      manquantes.push(cle);
      return;
    }
    var nombre = parseFloat(val);
    if (isNaN(nombre)) {
      manquantes.push(cle);
      return;
    }
    payload[cle] = nombre;
  });

  if (manquantes.length > 0) {
    alert('Toutes les valeurs doivent être renseignées (manquant : ' + manquantes.join(', ') + ').');
    return;
  }

  fetch(urlAPI('?action=maj_pmi&payload=' + encodeURIComponent(JSON.stringify(payload))))
    .then(function(r){ return r.json(); })
    .then(function(res){
      // On marque comme traites tous les evenements PMI passes ou du jour
      var today = new Date().toISOString().substring(0, 10);
      if (typeof calEvents !== 'undefined' && calEvents) {
        calEvents.forEach(function(e) {
          if (!e.type || !e.date) return;
          if (e.type.toLowerCase().indexOf('pmi') < 0) return;
          if (e.date <= today) {
            localStorage.setItem('pmi_done_' + e.date, '1');
          }
        });
      }
      // Filet de securite : la dateISO transmise
      localStorage.setItem('pmi_done_' + dateISO, '1');
      var m = document.getElementById('pmi-modal');
      if (m) m.remove();
      chargerDonnees();
      console.log('PMI : ' + (res.message || 'mis à jour'));
    })
    .catch(function(err){
      alert('Erreur : ' + err.message);
    });
}

      deb.addEventListener('change', function() {
        if (!fin.value || fin.value === fin.dataset.autoRempli) {
          fin.value = deb.value;
          fin.dataset.autoRempli = deb.value;
        }
      });
    }
  });
}
  
function enregistrerSalons(dateISO) {
  var cles = ['ces','mwc','ww','asco','ada','defense','esmo'];
  var payload = {};
  var reportes = [];

  cles.forEach(function(c) {
    var debEl = document.getElementById('sal-' + c + '-debut');
    if (!debEl) return;

    var na = document.getElementById('sal-' + c + '-na');
    var d  = debEl.value;
    var f  = document.getElementById('sal-' + c + '-fin').value;

    if (d && f && (!na || !na.checked)) {
      payload[c] = { debut: d, fin: f };
    } else {
      reportes.push(c);
    }
  });

  if (Object.keys(payload).length === 0 && reportes.length === 0) {
    alert('Aucune saisie.');
    return;
  }

  if (reportes.length > 0) {
    var relance = new Date(dateISO + 'T00:00:00');
    relance.setMonth(relance.getMonth() + 1);
    payload.__relanceAu = relance.toISOString().substring(0,10);
  }

  fetch(urlAPI('?action=maj_salons&payload=' + encodeURIComponent(JSON.stringify(payload))))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (reportes.length === 0) {
        localStorage.setItem('salons_done_' + dateISO, '1');
      }
      var m = document.getElementById('salons-modal');
      if (m) m.remove();
      chargerDonnees();
      console.log('Salons : ' + (res.nbAjoutes || 0) + ' ligne(s) ajoutee(s). Reportes : ' + reportes.length);

}

function afficherModaleFOMC(dateISO) {
  var m = document.getElementById('fomc-modal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'fomc-modal';
    m.style.cssText =
      'position:fixed;inset:0;background:rgba(0,0,0,.6);' +
      'z-index:9999;display:flex;justify-content:center;align-items:center;' +
      'padding:16px;overflow-y:auto;';
    document.body.appendChild(m);
  }

  var anneeCible = new Date(dateISO + 'T00:00:00').getFullYear() + 1;

  // Compter les réunions FOMC déjà en base pour l'année cible
  var dejaSaisies = 0;
  for (var i = 0; i < calEvents.length; i++) {
    var e = calEvents[i];
    if (!e.date || !e.type) continue;
    if (e.type.toLowerCase() !== 'réunion fomc') continue;
    if (parseInt(e.date.substring(0, 4), 10) === anneeCible) dejaSaisies++;
  }

  if (dejaSaisies >= 8) {
    alert('Les 8 réunions FOMC de ' + anneeCible + ' sont déjà saisies');
    localStorage.setItem('fomc_done_' + dateISO, '1');
    m.remove();
    chargerDonnees();
    return;
  }

  var parts = [];
  parts.push('<div style="background:var(--bg);padding:20px;border-radius:8px;max-width:520px;width:100%;font-size:14px;max-height:90vh;overflow-y:auto;">');
  parts.push('<h3 style="margin:0 0 6px 0;">Dates FOMC ' + anneeCible + '</h3>');
  parts.push('<div style="font-size:11px;color:var(--dim);margin-bottom:8px;">Saisir les 8 réunions FOMC. Laisse vide ce qui n\'est pas encore annoncé.</div>');
  parts.push('<div id="lien-fomc" style="margin-bottom:14px;"></div>');
  parts.push('<div style="font-size:11px;color:var(--dim);margin-bottom:6px;">' + dejaSaisies + '/8 déjà saisies pour ' + anneeCible + '</div>');

  for (var j = 1; j <= 8; j++) {
    parts.push('<div style="border:1px solid var(--border-dim);border-radius:6px;padding:8px 10px;margin-bottom:6px;background:var(--bg2);display:flex;align-items:center;gap:10px;">');
    parts.push('<b style="min-width:90px;">Réunion ' + j + '</b>');
    parts.push('<input id="fomc-r' + j + '" type="date" style="font-size:12px;">');
    parts.push('</div>');
  }

  parts.push('<div style="margin-top:14px;display:flex;justify-content:flex-end;gap:8px;">');
  parts.push('<button onclick="document.getElementById(\'fomc-modal\').remove()">Annuler</button>');
  parts.push('<button onclick="enregistrerFOMC(\'' + dateISO + '\')" style="background:var(--blue);color:#fff;padding:6px 14px;border:none;border-radius:4px;">Valider</button>');
  parts.push('</div>');
  parts.push('</div>');

  m.innerHTML = parts.join('');

  // Injection du lien officiel en JS pur (pour éviter que le HTML soit mangé)
  var placeholder = document.getElementById('lien-fomc');
  if (placeholder) {
    var a = document.createElement('a');
    a.href = 'https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm';
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = 'Site officiel Fed FOMC';
    a.style.fontSize = '12px';
    a.style.color = '#58a6ff';
    a.style.textDecoration = 'underline';
    placeholder.appendChild(a);
  }
}

function chargerTickersFiltre() {
  fetch(urlAPI('?action=tickers'))
    .then(function(r){ return r.json(); })
    .then(function(list){
      calTickers = list || [];
      initFiltreCalendrier();
    })
    .catch(function(err){ console.log('Erreur chargement tickers filtre:', err); });
}

function initFiltreCalendrier() {
  // Afficher la barre
  var bar = document.getElementById('cal-filter-bar');
  if (bar) bar.style.display = 'block';

  // Restaurer le filtre depuis localStorage
  var savedTicker = localStorage.getItem(CAL_FILTER_KEY);
  if (savedTicker) {
    var found = calTickers.find(function(t){ return t.ticker === savedTicker; });
    if (found) {
      calFiltre = found;
      afficherFiltreActif();
    }
  }

  // Setup input
  var input = document.getElementById('cal-filter-input');
  if (input) {
    input.addEventListener('input', function() {
      montrerListeTickers(input.value);
    });
    input.addEventListener('focus', function() {
      montrerListeTickers(input.value);
    });
    input.addEventListener('blur', function() {
      // Léger délai pour permettre le clic sur un item
      setTimeout(function() {
        var list = document.getElementById('cal-filter-list');
        if (list) list.style.display = 'none';
      }, 200);
    });
  }
}

function montrerListeTickers(query) {
  var list = document.getElementById('cal-filter-list');
  if (!list) return;

  var q = (query || '').toLowerCase().trim();
  var filtered = calTickers.filter(function(t) {
    if (!q) return true;
    return t.ticker.toLowerCase().indexOf(q) >= 0
        || (t.nom || '').toLowerCase().indexOf(q) >= 0;
  });

  // Option "Tous" en premier
  var html = '<div class="cal-filter-item" data-ticker="__ALL__" ' +
             'style="padding:8px 10px;cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--text);border-bottom:1px solid var(--border-dim);">' +
             '📋 Tous les événements' +
             '</div>';

  if (filtered.length === 0 && q) {
    html += '<div style="padding:8px 10px;color:var(--dim);font-family:var(--mono);font-size:11px;font-style:italic;">Aucun ticker trouvé</div>';
  } else {
    for (var i = 0; i < filtered.length; i++) {
      var t = filtered[i];
      html += '<div class="cal-filter-item" data-ticker="' + t.ticker + '" ' +
              'style="padding:6px 10px;cursor:pointer;font-family:var(--mono);font-size:11px;border-bottom:1px solid var(--border-dim);">' +
              '<div style="color:var(--text);font-weight:600;">' + t.ticker + '</div>' +
              '<div style="color:var(--dim);font-size:10px;">' + (t.nom || '') + ' — ' + (t.secteur || '') + '</div>' +
              '</div>';
    }
  }

  list.innerHTML = html;
  list.style.display = 'block';

  // Bind clics
  var items = list.querySelectorAll('.cal-filter-item');
  for (var j = 0; j < items.length; j++) {
    items[j].addEventListener('mousedown', function(e) {
      var ticker = e.currentTarget.getAttribute('data-ticker');
      selectionnerFiltreTicker(ticker);
    });
  }
}

function selectionnerFiltreTicker(ticker) {
  var list = document.getElementById('cal-filter-list');
  var input = document.getElementById('cal-filter-input');
  if (list) list.style.display = 'none';

  if (ticker === '__ALL__') {
    calFiltre = null;
    localStorage.removeItem(CAL_FILTER_KEY);
    if (input) input.value = '';
  } else {
    var found = calTickers.find(function(t){ return t.ticker === ticker; });
    if (!found) return;
    calFiltre = found;
    localStorage.setItem(CAL_FILTER_KEY, ticker);
    if (input) input.value = '';
  }

  afficherFiltreActif();

  // Re-rendu du calendrier
  if (typeof afficherCalendrier === 'function') {
    afficherCalendrier(calEvents);
  }
}

function resetFiltreCalendrier() {
  selectionnerFiltreTicker('__ALL__');
}

function afficherFiltreActif() {
  var active = document.getElementById('cal-filter-active');
  var clear = document.getElementById('cal-filter-clear');
  if (calFiltre) {
    if (active) {
      active.textContent = 'Filtre : ' + calFiltre.ticker + ' (' + (calFiltre.secteur || '?') + ')';
      active.style.display = 'block';
    }
    if (clear) clear.style.display = 'block';
  } else {
    if (active) active.style.display = 'none';
    if (clear) clear.style.display = 'none';
  }
}

/**
 * Applique le filtre actif sur la liste d'événements.
 * Renvoie la liste filtrée selon la logique :
 *   - "Tous" : tout, y compris Système
 *   - Ticker T (secteur S) : événements T + événements Macro + événements dont poche contient S,
 *     mais PAS Système
 */
function filtrerEvenementsCal(events) {
  if (!events || !events.length) return [];
  if (!calFiltre) return events; // "Tous" → tout

  var tCible = calFiltre.ticker;
  var sCible = (calFiltre.secteur || '').toLowerCase().trim();

  return events.filter(function(e) {
    var poche = (e.poche || '').toLowerCase();

    // Système : jamais affiché en mode filtré
    if (poche.indexOf('système') >= 0 || poche.indexOf('systeme') >= 0) return false;

    // Événement du ticker sélectionné
    if (e.ticker === tCible) return true;

    // Événement Macro
    if (poche.indexOf('macro') >= 0) return true;

    // Événement dont la poche contient le secteur du ticker
    if (sCible && poche.indexOf(sCible) >= 0) return true;

    return false;
  });
}
